<!DOCTYPE html>
<html lang="en">
<head>

    <title>Hubungi Kami</title>
</head>
<body>
    <h1>Hubungi Kami</h1>

        Jenis Kelamin <br>

        <input type="radio" name="jk" value="P">
        perempuan <br>
        Mengetahui UMDP dari mana <br>
        <input type="checkbox" name="cb1" value="K">
        Keluarga <br>
        <input type="checkbox" name="cb1" value="S">
        Social Media <br>
        media <br>
        foto <br>
        <input type="file" name="foto" id=""> <br>
        <button type="submit">Simpan</button>
        <button type="reset">Reset</button>
    </form>
</body>
</html>
